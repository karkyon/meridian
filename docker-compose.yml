
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: meridian_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-meridian}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meridian_secret}
      POSTGRES_DB: ${POSTGRES_DB:-meridian_db}
    ports:
      - "${POSTGRES_PORT:-5442}:5442"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-meridian} -d ${POSTGRES_DB:-meridian_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
